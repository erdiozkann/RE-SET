# RE-SET — nginx (VPS, Traefik arkasında TLS-terminated)
# Bu dosya public/.htaccess'in nginx karşılığıdır: SPA fallback + güvenlik
# başlıkları + /methods→/demartini-yontemi 301 + gzip + immutable asset cache.
# TLS'i Traefik hallediyor; nginx yalnız 80'de düz HTTP servis eder.

server {
    listen 80;
    server_name re-set.com.tr www.re-set.com.tr;

    root /usr/share/nginx/html;
    index index.html;

    # www → apex 301 (canonical https://re-set.com.tr/ ile tutarlı)
    if ($host = www.re-set.com.tr) {
        return 301 https://re-set.com.tr$request_uri;
    }

    # --- gzip (brotli nginx:alpine'de yok; gzip yeterli) ---
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/rss+xml application/manifest+json
        image/svg+xml font/ttf font/otf font/woff font/woff2;

    # --- Güvenlik başlıkları (.htaccess ile birebir) ---
    # always → hata sayfalarında da uygulanır. HSTS Traefik/https üzerinden geçer.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.google-analytics.com https://region1.google-analytics.com https://*.analytics.google.com https://*.clarity.ms; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; media-src 'self' https:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;

    # --- SEO: eski /methods slug'ı → canonical /demartini-yontemi ---
    location = /methods  { return 301 /demartini-yontemi; }
    location = /methods/ { return 301 /demartini-yontemi; }

    # --- Hash'li asset'ler: immutable, 1 yıl cache ---
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # --- SPA fallback: dosya yoksa index.html ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # .htaccess vb. gizli dosyalara erişimi engelle
    location ~ /\.(?!well-known) { deny all; }
}

<!doctype html>
<!--
  RE-SET OG görsel kaynağı (regenere edilebilir).
  Bunu 1200×630'da ekran görüntüsü al → public/og-image.jpg olarak kaydet.
  Örn: Chrome'da aç, pencereyi 1200×630 yap, .card'ın screenshot'ını al.
-->
<html lang="tr">
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  .card {
    width: 1200px; height: 630px; position: relative; overflow: hidden;
    background: radial-gradient(120% 120% at 85% 15%, #2a2622 0%, #1A1A1A 55%, #141210 100%);
    font-family: 'Inter', system-ui, sans-serif; color: #F4EFE6;
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 72px 80px;
  }
  .card::after {
    content: ""; position: absolute; right: -180px; top: -180px;
    width: 620px; height: 620px; border-radius: 50%;
    background: radial-gradient(circle, rgba(212,175,55,0.22) 0%, rgba(212,175,55,0) 70%);
  }
  .top { display: flex; align-items: center; gap: 18px; position: relative; z-index: 2; }
  .logo {
    font-family: 'Playfair Display', serif; font-weight: 700; font-size: 40px;
    letter-spacing: 6px; color: #D4AF37;
  }
  .divider { width: 2px; height: 34px; background: rgba(244,239,230,0.25); }
  .who { font-size: 22px; font-weight: 500; color: #D8CEBE; letter-spacing: 1px; }
  .mid { position: relative; z-index: 2; }
  .kicker {
    font-size: 22px; font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
    color: #D4AF37; margin-bottom: 20px;
  }
  h1 {
    font-family: 'Playfair Display', serif; font-weight: 700;
    font-size: 82px; line-height: 1.04; color: #F7F3EA; max-width: 900px;
  }
  h1 .accent { color: #D4AF37; }
  .sub { margin-top: 26px; font-size: 26px; color: #C9BFAF; font-weight: 400; max-width: 820px; }
  .bottom {
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 2; font-size: 22px; color: #B7AD9C;
  }
  .url { color: #D4AF37; font-weight: 600; letter-spacing: 1px; }
  .loc { display: flex; align-items: center; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #D4AF37; }
</style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="logo">RE·SET</div>
      <div class="divider"></div>
      <div class="who">Şafak Özkan</div>
    </div>

    <div class="mid">
      <div class="kicker">Sertifikalı Uygulayıcı · Türkiye</div>
      <h1>Demartini <span class="accent">Yöntemi</span><br>ve Metodu</h1>
      <div class="sub">Değer belirleme · Breakthrough Experience · ilişki dengeleme · kişisel dönüşüm</div>
    </div>

    <div class="bottom">
      <div class="url">re-set.com.tr</div>
      <div class="loc"><span class="dot"></span> İstanbul · Nişantaşı</div>
    </div>
  </div>
</body>
</html>

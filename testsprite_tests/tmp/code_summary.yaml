version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React (Vite)
  - Tailwind CSS
  - i18next
  - Supabase
routes:
  - path: /
    file: src/pages/home/page.tsx
    auth_required: false
    description: Homepage
  - path: /blog
    file: src/pages/blog/page.tsx
    auth_required: false
    description: Blog listing
  - path: /booking
    file: src/pages/booking/page.tsx
    auth_required: true
    description: Online booking flow
  - path: /login
    file: src/pages/login/page.tsx
    auth_required: false
    description: Login page
  - path: /register
    file: src/pages/register/page.tsx
    auth_required: false
    description: Registration page
  - path: /about
    file: src/pages/about/page.tsx
    auth_required: false
    description: About page
  - path: /methods
    file: src/pages/methods/page.tsx
    auth_required: false
    description: Methods page
features:
  - name: Auth
    description: Login and Registration
    files: [src/pages/login/page.tsx, src/pages/register/page.tsx]
    entry_route: /login
    user_interactions: [Fill credentials, click login]
    auth_required: false
  - name: Booking
    description: Appointment scheduling
    files: [src/pages/booking/page.tsx]
    entry_route: /booking
    user_interactions: [Select service, select date/time]
    auth_required: true
  - name: LanguageSwitch
    description: Toggle TR/EN
    files: [src/components/feature/Header.tsx]
    entry_route: /
    user_interactions: [Click flag toggle]
    auth_required: false
known_limitations: []

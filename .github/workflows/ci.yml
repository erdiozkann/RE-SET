name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (saves CI minutes when a PR is pushed rapidly).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, types, build, smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript type-check
        run: npx tsc --noEmit

      # vite build alone — skips scripts/generate-{sitemap,llms-full}.mjs because
      # those require Supabase credentials. The full `npm run build` is run by
      # the deploy step, not CI. Verifies the bundle compiles and that the
      # vite-prerender-plugin produces per-route HTML.
      - name: Vite production build
        run: npx vite build

      # Pin Chromium to the version Playwright was published against, with deps.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
